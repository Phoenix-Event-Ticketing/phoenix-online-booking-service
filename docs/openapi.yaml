openapi: 3.0.3
info:
  title: Phoenix Online Booking Service API
  version: 1.0.0
  description: API contract for the Phoenix Online Booking Service

servers:
  - url: http://localhost:8083

tags:
  - name: Bookings
    description: Booking lifecycle operations

paths:
  /bookings:
    post:
      tags: [Bookings]
      summary: Create a new booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
            examples:
              sample:
                value:
                  eventId: EVT-1001
                  customerName: Christy Kingsley
                  customerEmail: christy@example.com
                  ticketType: VIP
                  quantity: 2
                  totalAmount: 5000.00
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Validation or business rule failure
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "502":
          description: Downstream integration error

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Get booking by bookingId
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          example: BKG-ABC1234567
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Booking not found

  /bookings/customer/{email}:
    get:
      tags: [Bookings]
      summary: Get bookings by customer email
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
          example: christy@example.com
      responses:
        "200":
          description: Booking list returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /bookings/{bookingId}/cancel:
    patch:
      tags: [Bookings]
      summary: Cancel booking
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          example: BKG-ABC1234567
      responses:
        "200":
          description: Booking cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Invalid booking state
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Booking not found

  /bookings/{bookingId}/start-payment:
    post:
      tags: [Bookings]
      summary: Start payment for a booking
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          example: BKG-ABC1234567
      responses:
        "200":
          description: Payment session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPaymentResponse"
        "400":
          description: Invalid booking state
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Booking not found
        "502":
          description: Downstream integration error

  /bookings/{bookingId}/expire:
    post:
      tags: [Bookings]
      summary: Expire booking
      security:
        - internalServiceToken: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
          example: BKG-ABC1234567
      responses:
        "200":
          description: Booking expired successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Invalid booking state
        "401":
          description: Unauthorized
        "404":
          description: Booking not found

  /bookings/payment-callback:
    post:
      tags: [Bookings]
      summary: Handle payment callback
      security:
        - internalServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCallbackRequest"
            examples:
              success:
                value:
                  bookingId: BKG-ABC1234567
                  paymentReferenceId: PAY-123456
                  paymentStatus: SUCCESS
                  transactionId: TXN-0001
      responses:
        "200":
          description: Payment callback processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Invalid callback payload or state
        "401":
          description: Unauthorized
        "404":
          description: Booking not found
        "502":
          description: Downstream integration error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceToken:
      type: apiKey
      in: header
      name: X-Internal-Service-Token

  schemas:
    CreateBookingRequest:
      type: object
      required:
        - eventId
        - customerName
        - customerEmail
        - ticketType
        - quantity
        - totalAmount
      properties:
        eventId:
          type: string
          example: EVT-1001
        customerName:
          type: string
          example: Christy Kingsley
        customerEmail:
          type: string
          example: christy@example.com
        ticketType:
          type: string
          example: VIP
        quantity:
          type: integer
          example: 2
        totalAmount:
          type: number
          format: double
          example: 5000.00

    PaymentCallbackRequest:
      type: object
      required:
        - bookingId
        - paymentReferenceId
        - paymentStatus
      properties:
        bookingId:
          type: string
          example: BKG-ABC1234567
        paymentReferenceId:
          type: string
          example: PAY-123456
        paymentStatus:
          type: string
          example: SUCCESS
        transactionId:
          type: string
          example: TXN-0001

    StartPaymentResponse:
      type: object
      properties:
        bookingId:
          type: string
          example: BKG-ABC1234567
        paymentReferenceId:
          type: string
          example: PAY-123456
        paymentUrl:
          type: string
          example: https://payment.example/checkout/123
        bookingStatus:
          type: string
          example: AWAITING_PAYMENT
        paymentStatus:
          type: string
          example: PENDING

    BookingResponse:
      type: object
      properties:
        id:
          type: string
          example: 67f8bc9d1234567890abcdef
        bookingId:
          type: string
          example: BKG-ABC1234567
        eventId:
          type: string
          example: EVT-1001
        customerName:
          type: string
          example: Christy Kingsley
        customerEmail:
          type: string
          example: christy@example.com
        ticketType:
          type: string
          example: VIP
        quantity:
          type: integer
          example: 2
        totalAmount:
          type: number
          format: double
          example: 5000.00
        paymentReferenceId:
          type: string
          example: PAY-123456
        paymentUrl:
          type: string
          example: https://payment.example/checkout/123
        paymentTransactionId:
          type: string
          example: TXN-0001
        bookingStatus:
          type: string
          example: CONFIRMED
        paymentStatus:
          type: string
          example: SUCCESS
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
