version: "3.9"

services:
  booking-service:
    build: .
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      APP_PORT: 8083
      MONGODB_URI: mongodb://mongo:27017/booking_db
      MONGODB_DATABASE: booking_db
      JWT_SECRET: replace_with_a_minimum_32_character_secret
      JWT_ISSUER: phoenix-online-auth
      INTERNAL_SERVICE_TOKEN: replace_with_internal_service_secret
      BOOKING_SERVICE_CALLBACK_BASE_URL: http://host.docker.internal:8083
      EVENT_SERVICE_BASE_URL: http://host.docker.internal:8081
      INVENTORY_SERVICE_BASE_URL: http://host.docker.internal:8082
      PAYMENT_SERVICE_BASE_URL: http://host.docker.internal:8084
      APP_ENV: dev
      LOG_LEVEL: INFO
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: booking-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
