spring:
  application:
    name: ${APP_NAME:phoenix-online-booking-service}

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/booking_db}
      database: ${MONGODB_DATABASE:booking_db}

server:
  port: ${APP_PORT:8083}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

app:
  env: ${APP_ENV:dev}

security:
  jwt:
    secret: ${JWT_SECRET:replace_with_a_minimum_32_character_secret}
    issuer: ${JWT_ISSUER:phoenix-online-auth}
  internal:
    # JSON: {"service-id":["PERM1","PERM2"],...} - no secrets, permission-based authz.
    # Set via INTERNAL_SERVICE_PERMISSIONS_JSON or SECURITY_INTERNAL_SERVICE_PERMISSIONS_JSON.

services:
  booking:
    callback-base-url: ${BOOKING_SERVICE_CALLBACK_BASE_URL:http://localhost:8083}
  event:
    base-url: ${EVENT_SERVICE_BASE_URL:http://localhost:8081}
  inventory:
    base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8082}
  payment:
    base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8084}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

info:
  app:
    name: ${APP_NAME:phoenix-online-booking-service}
    description: Booking Service for Phoenix Online microservice application
    version: 1.0.0
